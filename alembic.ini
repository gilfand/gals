# alembic.ini
# ===============================================
# Конфигурация Alembic для NiceGUI проекта
# ===============================================

[alembic]
# Путь к папке с миграциями
script_location = migrations

# Где хранить файлы миграций
version_locations = %(script_location)s/versions

# Не используем интерполяцию здесь (DATABASE_URL берётся из env)
sqlalchemy.url = driver://user:pass@localhost/dbname

# Логирование
log_level = INFO
log_template = %(levelname)-5.5s [%(name)s] %(message)s

# Дополнительные настройки
prepend_sys_path = .
# version_path_separator = os  ; использует os.pathsep

# ====================== LOGGING ======================
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S