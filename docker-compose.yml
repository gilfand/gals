services:
  postgres:
    image: postgres:16
    container_name: industrial-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: industrial_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: industrial-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - .:/GALS  
      - ./data:/GALS/data
    depends_on:
      - postgres
    environment:
      - ENV=development
    command: python -u main.py

volumes:
  postgres_data: